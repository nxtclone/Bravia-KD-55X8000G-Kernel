name: Build Kernel

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Build kernel inside Docker (Ubuntu 20.04)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            -e ARCH=arm \
            -e CROSS_COMPILE=arm-linux-gnueabi- \
            ubuntu:20.04 \
            bash -c "
              export DEBIAN_FRONTEND=noninteractive &&
              apt-get update &&
              apt-get install -y \
                build-essential bc bison flex libssl-dev libelf-dev \
                u-boot-tools device-tree-compiler gcc-arm-linux-gnueabi procmail lzop &&
              make bravia_defconfig &&
              scripts/config --disable CONFIG_GCC_PLUGINS &&
              scripts/config --enable CONFIG_DEBUG_INFO &&
              make -j\$(nproc) HOSTCFLAGS=\"-fcommon\" modules &&
              make -j\$(nproc) HOSTCFLAGS=\"-fcommon\" uImage
            "

      - name: Upload Kernel Image
        uses: actions/upload-artifact@v4
        with:
          name: uImage
          path: arch/arm/boot/uImage

      - name: Upload vmlinux (with debug symbols)
        uses: actions/upload-artifact@v4
        with:
          name: vmlinux
          path: vmlinux

      - name: Upload System.map
        uses: actions/upload-artifact@v4
        with:
          name: System.map
          path: System.map

      - name: Upload kernel config
        uses: actions/upload-artifact@v4
        with:
          name: config
          path: .config

      - name: Upload Kernel Modules
        uses: actions/upload-artifact@v4
        with:
          name: kernel-modules
          path: '**/*.ko'
