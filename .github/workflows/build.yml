name: Build Kernel

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ARCH: arm
      CROSS_COMPILE: arm-linux-gnueabi-

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential bc bison flex libssl-dev libelf-dev u-boot-tools device-tree-compiler gcc-arm-linux-gnueabi

    - name: Configure Kernel
      run: make bravia_defconfig

    - name: Disable GCC plugins
      run: scripts/config --disable CONFIG_GCC_PLUGINS || true

    - name: Fix dtc build
      run: sed -i '1i %option noyylloc' scripts/dtc/dtc-lexer.l

    - name: Build Kernel and Modules
      run: |
        make -j$(nproc) HOSTCFLAGS="-fcommon" modules
        make -j$(nproc) HOSTCFLAGS="-fcommon" uImage

    - name: Upload Kernel Image
      uses: actions/upload-artifact@v4
      with:
        name: uImage
        path: arch/arm/boot/uImage

    - name: Upload Kernel Modules
      uses: actions/upload-artifact@v4
      with:
        name: kernel-modules
        path: '**/*.ko'
